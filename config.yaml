cameras:
  input_source: 3  # 2 = OBS Virtual Camera / High-res device
  resolution:
    width: 1280
    height: 720

audio:
  speech_rate: 125  # Words per minute (slower and calmer)
  volume: 1.0       # 0.0 to 1.0
  cooldown: 15.0    # Time (seconds) between repeating same alert
  critical_cooldown: 15.0   # Seconds between repeating critical alerts for the same object
  close_cooldown: 20.0     # Seconds between repeating close alerts for the same object
  distance_update_threshold: 0.5  # Alert if object gets closer by this many meters
  global_silence_interval: 2.5    # Global silence between any two alerts
  critical_silence_interval: 1.0  # Silence window for critical alerts

# AI inference settings (YOLO)
ai:
  yolo_model: "models/yolov8n.pt"
  yolo_backend: "pytorch"   # Options: "pytorch", "onnx"
  confidence_threshold: 0.5

# Obstacle detection & distance settings
obstacles:
  close_threshold: 3.0      # Distance (m) to start reporting distance (only when close)
  critical_threshold: 1.5   # Distance (m) for critical warning (extremely close)
  near_object_threshold: 2.5 # Distance (m) to report general near objects
  camera_height: 1.4        # Estimated camera height in meters
  horizon_ratio: 0.35       # Estimated horizon position (0.0 to 1.0 of frame height)
  hole_sensitivity: "very_low" # Sensitivity for hole detection: "high", "medium", "low", "very_low"

