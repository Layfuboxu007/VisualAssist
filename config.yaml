cameras:
  input_source: 3  # 2 = OBS Virtual Camera / High-res device
  resolution:
    width: 1280
    height: 720

audio:
  speech_rate: 150  # Words per minute
  volume: 1.0       # 0.0 to 1.0
  cooldown: 3.0     # Time (seconds) between repeating same alert

# AI inference settings (YOLO)
ai:
  yolo_model: "models/yolov8n.pt"
  yolo_backend: "pytorch"   # Options: "pytorch", "onnx"
  confidence_threshold: 0.5
